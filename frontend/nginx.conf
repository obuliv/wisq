server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location / {
        try_files $uri /index.html;
    }
}
